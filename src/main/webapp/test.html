<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>test</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: #1f2937;
      font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif;
      background: linear-gradient(135deg, #ecfdf5 0%, #f8fafc 46%, #eef2ff 100%);
    }
    .panel {
      width: min(520px, calc(100% - 32px));
      padding: 34px;
      border: 1px solid rgba(148, 163, 184, .22);
      border-radius: 8px;
      background: rgba(255, 255, 255, .92);
      box-shadow: 0 18px 60px rgba(15, 23, 42, .12);
      text-align: center;
    }
    h1 {
      margin: 0;
      color: #047857;
      font-size: 32px;
      letter-spacing: 0;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>Hello Servlet</h1>
  </main>
</body>
</html>
